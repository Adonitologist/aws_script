name: Cloud Resume Frontend Deployment

on:
  push:
    branches:
      - main
    # Updated to watch your correct frontend assets folder
    paths:
      - 'pruebas trabajo/aws-cloud-resume-challenge/frontend/**'

permissions:
  id-token: write 
  contents: read  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Authenticate with AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::154932391641:role/github-actions-cloud-resume-role
          aws-region: eu-north-1 

      # Updated to sync from the correct source folder
      - name: Deploy Frontend Files to S3 Bucket
        run: |
          aws s3 sync "./pruebas trabajo/aws-cloud-resume-challenge/frontend" s3://juaneslava-cloud-resume-2026 --delete

      - name: Invalidate CloudFront Global Cache Distribution
        run: |
          aws cloudfront create-invalidation --distribution-id E3CSQJMYF4ECSE --paths "/*"